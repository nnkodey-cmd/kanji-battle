<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>漢字バトル</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700;800&family=Noto+Serif+JP:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans JP', sans-serif; background: #f2ede6; }
    rt { font-size: 0.55em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    // ルビつきテキスト
    const R = ({ k, r }) => (
      <ruby><span>{k}</span><rp>（</rp><rt>{r}</rt><rp>）</rp></ruby>
    );

    // ===== 画面向き検知 =====
    function useIsLandscape() {
      const [isLandscape, setIsLandscape] = useState(window.innerWidth > window.innerHeight);
      useEffect(() => {
        const update = () => setIsLandscape(window.innerWidth > window.innerHeight);
        window.addEventListener("resize", update);
        window.addEventListener("orientationchange", update);
        return () => {
          window.removeEventListener("resize", update);
          window.removeEventListener("orientationchange", update);
        };
      }, []);
      return isLandscape;
    }

    // ===== 描画キャンバス =====
    function DrawingCanvas({ disabled, clearSignal, rotated }) {
      const canvasRef = useRef(null);
      const [isDrawing, setIsDrawing] = useState(false);
      const [strokeCount, setStrokeCount] = useState(0);
      const currentStroke = useRef([]);
      const allStrokes = useRef([]);
      const ctxRef = useRef(null);

      const drawGuide = (ctx) => {
        ctx.clearRect(0, 0, 300, 300);
        ctx.strokeStyle = "#d4c9f0";
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, 296, 296);
        ctx.strokeStyle = "#e2daf5";
        ctx.lineWidth = 1;
        ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(150, 8); ctx.lineTo(150, 292);
        ctx.moveTo(8, 150); ctx.lineTo(292, 150);
        ctx.stroke();
        ctx.setLineDash([]);
      };

      useEffect(() => {
        const ctx = canvasRef.current.getContext("2d");
        ctxRef.current = ctx;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        drawGuide(ctx);
      }, []);

      useEffect(() => {
        allStrokes.current = [];
        setStrokeCount(0);
        if (ctxRef.current) drawGuide(ctxRef.current);
      }, [clearSignal]);

      const getPos = (e) => {
        const canvas = canvasRef.current;
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const cx = e.touches ? e.touches[0].clientX : e.clientX;
        const cy = e.touches ? e.touches[0].clientY : e.clientY;
        const rawX = (cx - rect.left) * scaleX;
        const rawY = (cy - rect.top) * scaleY;
        if (rotated) return { x: 300 - rawX, y: 300 - rawY };
        return { x: rawX, y: rawY };
      };

      const startDraw = (e) => {
        if (disabled) return;
        e.preventDefault();
        setIsDrawing(true);
        const pos = getPos(e);
        currentStroke.current = [pos];
        const ctx = ctxRef.current;
        ctx.strokeStyle = "#1a0a3e";
        ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(pos.x, pos.y);
      };

      const draw = (e) => {
        if (!isDrawing || disabled) return;
        e.preventDefault();
        const pos = getPos(e);
        currentStroke.current.push(pos);
        ctxRef.current.lineTo(pos.x, pos.y);
        ctxRef.current.stroke();
      };

      const endDraw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        setIsDrawing(false);
        allStrokes.current = [...allStrokes.current, currentStroke.current];
        setStrokeCount(allStrokes.current.length);
        currentStroke.current = [];
      };

      const clear = () => {
        allStrokes.current = [];
        setStrokeCount(0);
        drawGuide(ctxRef.current);
      };

      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10, transform: rotated ? "rotate(180deg)" : "none" }}>
          <canvas
            ref={canvasRef}
            width={300} height={300}
            style={{
              borderRadius: 16, background: "#faf7f2",
              cursor: disabled ? "not-allowed" : "crosshair",
              touchAction: "none",
              boxShadow: disabled ? "none" : "0 6px 24px rgba(45,27,105,0.18)",
              width: "min(300px, 85vw)", height: "min(300px, 85vw)",
              opacity: disabled ? 0.4 : 1,
              transition: "opacity 0.3s, box-shadow 0.3s",
            }}
            onMouseDown={startDraw} onMouseMove={draw} onMouseUp={endDraw} onMouseLeave={endDraw}
            onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={endDraw}
          />
          <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
            <button onClick={clear} disabled={disabled} style={{
              padding: "5px 18px", borderRadius: 20, border: "2px solid #7c5cbf",
              background: "transparent", color: "#7c5cbf", fontFamily: "'Noto Sans JP', sans-serif",
              cursor: disabled ? "not-allowed" : "pointer", fontSize: 13, fontWeight: 600, opacity: disabled ? 0.4 : 1,
            }}>けす</button>
            <span style={{ fontSize: 12, color: "#aaa" }}>ストローク: {strokeCount}</span>
          </div>
        </div>
      );
    }

    // ===== スコアパネル =====
    function ScorePanel({ playerNum, score, passes, isAnswerer, isActive, onPass, onUndoPass, isQuestioner, phase, onJudge, onUndoJudge, rotated }) {
      const color = playerNum === 1 ? "#c0392b" : "#16a085";
      const lightBg = playerNum === 1 ? "#fff4f3" : "#f0faf7";

      return (
        <div style={{
          display: "flex", flexDirection: "column", alignItems: "center",
          gap: 10, padding: "18px 14px", borderRadius: 18,
          background: isActive ? lightBg : "#f7f7f7",
          border: `3px solid ${isActive ? color : "#e0e0e0"}`,
          minWidth: 120, maxWidth: 150,
          boxShadow: isActive ? `0 4px 18px ${color}35` : "none",
          transition: "all 0.35s",
          transform: rotated ? "rotate(180deg)" : "none",
        }}>
          <div style={{ fontSize: 12, fontWeight: 800, letterSpacing: 2, color: isActive ? color : "#bbb" }}>P{playerNum}</div>
          <div style={{ fontSize: 56, fontWeight: 900, lineHeight: 1, color: isActive ? color : "#ccc", fontFamily: "'Noto Serif JP', serif", transition: "color 0.3s" }}>{score}</div>
          <div style={{ fontSize: 11, color: "#aaa" }}>点</div>

          {isAnswerer && (
            <React.Fragment>
              <div style={{ display: "flex", gap: 5, marginTop: 2 }}>
                {[0,1,2].map(i => (
                  <div key={i} style={{
                    width: 14, height: 14, borderRadius: "50%",
                    background: i < passes ? color : "#e0e0e0",
                    border: `2px solid ${i < passes ? color : "#ccc"}`,
                    transition: "all 0.3s",
                  }} />
                ))}
              </div>
              <div style={{ fontSize: 11, color: "#999" }}>パス {passes}/3</div>
              <button onClick={onPass} disabled={passes >= 3 || !isActive} style={{
                padding: "9px 0", width: "100%", borderRadius: 22,
                border: `2px solid ${isActive && passes < 3 ? color : "#ddd"}`,
                background: isActive && passes < 3 ? color : "#eee",
                color: isActive && passes < 3 ? "white" : "#bbb",
                fontFamily: "'Noto Sans JP', sans-serif",
                cursor: isActive && passes < 3 ? "pointer" : "not-allowed",
                fontSize: 14, fontWeight: 700, transition: "all 0.2s",
              }}>パス</button>
              {passes > 0 && phase === "ready" && (
                <button onClick={onUndoPass} style={{
                  padding: "7px 0", width: "100%", borderRadius: 22,
                  border: "2px solid #888", background: "#f0f0f0", color: "#555",
                  fontFamily: "'Noto Sans JP', sans-serif",
                  cursor: "pointer", fontSize: 11, fontWeight: 700,
                }}>↩ もどる</button>
              )}
            </React.Fragment>
          )}

          {!isAnswerer && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, width: "100%" }}>
              <div style={{ fontSize: 11, color: isActive ? color : "#bbb", fontWeight: 700, letterSpacing: 1 }}>
                {isActive ? "📖 しゅつだい中" : "まちじかん"}
              </div>
              {isQuestioner && phase === "answer" && (
                <div style={{ display: "flex", flexDirection: "column", gap: 6, width: "100%", marginTop: 4 }}>
                  <div style={{ fontSize: 10, color: "#999", textAlign: "center" }}><R k="採点" r="さいてん" /></div>
                  {[
                    { label: "✗ まちがい", sub: "0点", pts: 0, c: "#e74c3c", bg: "#fdecea" },
                    { label: "✓ せいかい", sub: "+1点", pts: 1, c: "#e67e22", bg: "#fff9e6" },
                    { label: "🎯 かきじゅんも", sub: "+2点", pts: 2, c: "#27ae60", bg: "#e8f8f0" },
                  ].map(({ label, sub, pts, c, bg }) => (
                    <button key={pts} onClick={() => onJudge(pts)} style={{
                      padding: "8px 4px", borderRadius: 10, border: `2px solid ${c}`,
                      background: bg, color: c, fontSize: 11, fontWeight: 700,
                      cursor: "pointer", lineHeight: 1.4, width: "100%",
                    }}>{label}<br />{sub}</button>
                  ))}
                </div>
              )}
              {isQuestioner && phase === "result" && (
                <button onClick={onUndoJudge} style={{
                  padding: "8px 6px", width: "100%", borderRadius: 10,
                  border: "2px solid #888", background: "#f0f0f0", color: "#555",
                  fontFamily: "'Noto Sans JP', sans-serif",
                  cursor: "pointer", fontSize: 11, fontWeight: 700,
                }}>↩ まちがえた<br />もどる</button>
              )}
            </div>
          )}
        </div>
      );
    }

    // ===== 準備カード =====
    function ReadyCard({ questioner, onReady, rotated, compact }) {
      return (
        <div style={{
          background: "white", borderRadius: 16, padding: compact ? "16px 14px" : "24px 20px",
          boxShadow: "0 4px 20px rgba(45,27,105,0.12)", border: "2px solid #2d1b69",
          textAlign: "center", maxWidth: compact ? 160 : 360,
          transform: rotated ? "rotate(180deg)" : "none",
        }}>
          <div style={{ fontSize: compact ? 28 : 40, marginBottom: 8 }}>📖</div>
          <div style={{ fontFamily: "'Noto Serif JP', serif", fontSize: compact ? 14 : 18, color: "#1a0a3e", fontWeight: 700, marginBottom: 6 }}>
            P{questioner + 1}（しゅつだいしゃ）へ
          </div>
          <div style={{ fontSize: compact ? 11 : 13, color: "#666", lineHeight: 1.8, marginBottom: compact ? 12 : 18 }}>
            かんじをえらんで、<br />じゅんびができたらおしてください
          </div>
          <button onClick={onReady} style={{
            padding: compact ? "10px 18px" : "12px 28px", borderRadius: 24,
            background: "linear-gradient(135deg, #2d1b69, #16a085)",
            border: "none", color: "white", fontSize: compact ? 13 : 15, fontWeight: 700,
            cursor: "pointer", fontFamily: "'Noto Sans JP', sans-serif",
            boxShadow: "0 3px 12px rgba(45,27,105,0.3)",
          }}>じゅんびかんりょう →</button>
        </div>
      );
    }

    // ===== 結果カード =====
    function ResultCard({ roundResult, rotated, inline }) {
      const color = roundResult === 2 ? "#27ae60" : roundResult === 1 ? "#e67e22" : "#e74c3c";
      const bg = roundResult === 2 ? "#e8f8f0" : roundResult === 1 ? "#fff9e6" : "#fdecea";
      const border = roundResult === 2 ? "#27ae60" : roundResult === 1 ? "#f39c12" : "#e74c3c";
      const text = roundResult === 2 ? "🎉 かきじゅんもせいかい！ +2点"
        : roundResult === 1 ? "✓ せいかい！ +1点" : "✗ まちがい 0点";
      return (
        <div style={{
          padding: "10px 14px", borderRadius: 12, marginBottom: inline ? 10 : 0,
          background: bg, border: `2px solid ${border}`,
          transform: rotated ? "rotate(180deg)" : "none", textAlign: "center",
        }}>
          <div style={{ fontSize: 14, fontWeight: 700, color }}>{text}</div>
        </div>
      );
    }

    // ===== 次の問題ボタン =====
    function NextButton({ onClick, round, total, rotated, style }) {
      return (
        <button onClick={onClick} style={{
          padding: "11px 20px", borderRadius: 24,
          background: "linear-gradient(135deg, #2d1b69, #16a085)",
          border: "none", color: "white", fontSize: 14, fontWeight: 700,
          cursor: "pointer", fontFamily: "'Noto Sans JP', sans-serif",
          transform: rotated ? "rotate(180deg)" : "none",
          ...style,
        }}>
          {round >= total ? "けっかをみる" : "つぎのもんだいへ →"}
        </button>
      );
    }

    // ===== メイン =====
    function KanjiBattle() {
      const [phase, setPhase] = useState("start");
      const [scores, setScores] = useState([0, 0]);
      const [passes, setPasses] = useState(0);
      const [questioner, setQuestioner] = useState(0);
      const [roundResult, setRoundResult] = useState(null);
      const [round, setRound] = useState(1);
      const [log, setLog] = useState([]);
      const [clearSignal, setClearSignal] = useState(0);
      const [passSnapshot, setPassSnapshot] = useState(null);
      const TOTAL_ROUNDS = 10;
      const isLandscape = useIsLandscape();

      const answerer = questioner === 0 ? 1 : 0;
      const p2Rotated = true;
      const canvasRotated = answerer === 1;
      const addLog = (msg) => setLog(l => [msg, ...l.slice(0, 9)]);

      const handleReady = () => { setClearSignal(s => s + 1); setPhase("answer"); };

      const handlePass = () => {
        setPassSnapshot({ passes, questioner, round });
        const newPasses = passes + 1;
        if (newPasses >= 3) {
          addLog(`P${answerer + 1} がパス3かい → ターンこうたい！`);
          setPasses(0);
          setQuestioner(answerer);
          setClearSignal(s => s + 1);
          setRound(r => r + 1);
          if (round >= TOTAL_ROUNDS) { setPhase("gameover"); return; }
          setPhase("ready");
        } else {
          setPasses(newPasses);
          addLog(`P${answerer + 1} がパス (${newPasses}/3)`);
          setClearSignal(s => s + 1);
          setPhase("ready");
        }
      };

      const handleUndoPass = () => {
        if (!passSnapshot) return;
        setPasses(passSnapshot.passes);
        setQuestioner(passSnapshot.questioner);
        setRound(passSnapshot.round);
        setPassSnapshot(null);
        setLog(l => l.slice(1));
        setClearSignal(s => s + 1);
        setPhase("ready");
      };

      const judge = (pts) => {
        const newScores = [...scores];
        newScores[answerer] += pts;
        setScores(newScores);
        const label = pts === 2 ? "かきじゅんもせいかい 🎉 +2点" : pts === 1 ? "せいかい ✓ +1点" : "まちがい ✗ 0点";
        addLog(`P${answerer + 1}: ${label}`);
        setRoundResult(pts);
        setPhase("result");
      };

      const undoJudge = () => {
        const newScores = [...scores];
        newScores[answerer] -= roundResult;
        setScores(newScores);
        setLog(l => l.slice(1));
        setRoundResult(null);
        setPhase("answer");
      };

      const nextRound = () => {
        const nextRoundNum = round + 1;
        if (nextRoundNum > TOTAL_ROUNDS) { setPhase("gameover"); return; }
        setPasses(0); setRoundResult(null); setPassSnapshot(null);
        setQuestioner(answerer); setRound(nextRoundNum);
        setClearSignal(s => s + 1); setPhase("ready");
      };

      const startGame = () => {
        setScores([0, 0]); setPasses(0); setQuestioner(0); setRound(1);
        setLog([]); setRoundResult(null); setPassSnapshot(null);
        setClearSignal(s => s + 1); setPhase("ready");
      };

      // ===== スタート画面 =====
      if (phase === "start") {
        return (
          <div style={{
            minHeight: "100vh",
            background: "linear-gradient(160deg, #120826 0%, #2d1b69 55%, #0d2b1e 100%)",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            fontFamily: "'Noto Sans JP', sans-serif", padding: 24,
          }}>
            <div style={{ textAlign: "center", marginBottom: 40 }}>
              <div style={{ fontSize: 12, letterSpacing: 6, color: "#9d8fd4", marginBottom: 14 }}>
                2にんで たいせん！ かんじの べんきょう ゲーム
              </div>
              <h1 style={{
                margin: 0, fontSize: "clamp(52px, 12vw, 88px)",
                fontFamily: "'Noto Serif JP', serif", color: "white", letterSpacing: 6,
                textShadow: "0 0 60px rgba(157,143,212,0.5), 0 2px 4px rgba(0,0,0,0.5)",
              }}><R k="漢字" r="かんじ" />バトル</h1>
            </div>
            <div style={{
              background: "rgba(255,255,255,0.07)", border: "1px solid rgba(255,255,255,0.13)",
              borderRadius: 20, padding: "24px 28px", maxWidth: 380, width: "100%", marginBottom: 36,
            }}>
              <div style={{ color: "#ffd700", fontSize: 16, marginBottom: 16, fontWeight: 700 }}>📜 ルール</div>
              {[
                ["📖", <React.Fragment><R k="出題者" r="しゅつだいしゃ" />は<R k="教科書" r="きょうかしょ" />などから<R k="漢字" r="かんじ" />をえらぶ</React.Fragment>],
                ["🤫", <React.Fragment><R k="回答者" r="かいとうしゃ" />にはみせずに「じゅんびかんりょう」をおす</React.Fragment>],
                ["✏️", <React.Fragment><R k="回答者" r="かいとうしゃ" />がキャンバスに<R k="漢字" r="かんじ" />をかく</React.Fragment>],
                ["✅", "かけた → +1点　かきじゅんもただしい → +2点"],
                ["⏭", "パスは2かいまで（3かいでターンこうたい）"],
                ["🔄", <React.Fragment>1もんごとに<R k="出題者" r="しゅつだいしゃ" />と<R k="回答者" r="かいとうしゃ" />がこうたい</React.Fragment>],
                ["🪑", <React.Fragment>P1は<R k="左側" r="ひだりがわ" />、P2は<R k="右側" r="みぎがわ" />からみてね</React.Fragment>],
              ].map(([icon, text], i) => (
                <div key={i} style={{ display: "flex", gap: 10, alignItems: "flex-start", color: "rgba(255,255,255,0.85)", fontSize: 13, lineHeight: 1.9, marginBottom: 4 }}>
                  <span style={{ flexShrink: 0 }}>{icon}</span><span>{text}</span>
                </div>
              ))}
            </div>
            <button onClick={startGame} style={{
              padding: "16px 56px", borderRadius: 40, fontSize: 20, fontWeight: 700,
              background: "linear-gradient(135deg, #ffd700, #ff9500)",
              border: "none", color: "#1a0826", cursor: "pointer",
              fontFamily: "'Noto Serif JP', serif", letterSpacing: 4,
              boxShadow: "0 6px 24px rgba(255,200,0,0.45)",
            }}>ゲームスタート！</button>
          </div>
        );
      }

      // ===== ゲームオーバー =====
      if (phase === "gameover") {
        const winner = scores[0] > scores[1] ? 1 : scores[1] > scores[0] ? 2 : 0;
        return (
          <div style={{
            minHeight: "100vh",
            background: "linear-gradient(160deg, #120826 0%, #2d1b69 55%, #0d2b1e 100%)",
            display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
            fontFamily: "'Noto Sans JP', sans-serif", padding: 24,
          }}>
            <div style={{ color: "#ffd700", fontFamily: "'Noto Serif JP', serif", fontSize: 36, marginBottom: 8 }}>ゲームしゅうりょう！</div>
            <div style={{ color: "rgba(255,255,255,0.8)", fontSize: 16, marginBottom: 32 }}>
              {winner > 0 ? <React.Fragment><span style={{ color: "#ffd700", fontWeight: 700 }}>P{winner}</span> のかち！🏆</React.Fragment> : "ひきわけ！🤝"}
            </div>
            <div style={{ display: "flex", gap: 20, marginBottom: 36 }}>
              {[0, 1].map(i => (
                <div key={i} style={{
                  background: winner === i + 1 ? "rgba(255,215,0,0.15)" : "rgba(255,255,255,0.08)",
                  border: `2px solid ${winner === i + 1 ? "#ffd700" : "rgba(255,255,255,0.15)"}`,
                  borderRadius: 18, padding: "24px 36px", textAlign: "center",
                }}>
                  <div style={{ color: "#9d8fd4", fontSize: 13, marginBottom: 4 }}>P{i + 1}</div>
                  <div style={{ color: winner === i + 1 ? "#ffd700" : "white", fontSize: 64, fontWeight: 900 }}>{scores[i]}</div>
                  <div style={{ color: "#9d8fd4", fontSize: 13 }}>点</div>
                </div>
              ))}
            </div>
            {log.length > 0 && (
              <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 14, padding: "14px 20px", maxWidth: 340, width: "100%", marginBottom: 32, maxHeight: 160, overflow: "hidden" }}>
                <div style={{ color: "#9d8fd4", fontSize: 11, marginBottom: 8 }}>きろく</div>
                {log.map((l, i) => (
                  <div key={i} style={{ color: `rgba(255,255,255,${0.75 - i * 0.06})`, fontSize: 12, padding: "3px 0", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>{l}</div>
                ))}
              </div>
            )}
            <button onClick={() => setPhase("start")} style={{
              padding: "14px 44px", borderRadius: 32, fontSize: 17, fontWeight: 700,
              background: "linear-gradient(135deg, #ffd700, #ff9500)",
              border: "none", color: "#1a0826", cursor: "pointer",
              fontFamily: "'Noto Serif JP', serif", letterSpacing: 2,
            }}>もういちど</button>
          </div>
        );
      }

      // ===== ゲーム画面 =====
      return (
        <div style={{ minHeight: "100vh", background: "#f2ede6", fontFamily: "'Noto Sans JP', sans-serif", display: "flex", flexDirection: "column" }}>
          {/* ヘッダー */}
          <div style={{ background: "linear-gradient(90deg, #2d1b69, #1a3a2a)", padding: "8px 16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ color: "white", fontFamily: "'Noto Serif JP', serif", fontSize: 16, letterSpacing: 3 }}><R k="漢字" r="かんじ" />バトル</span>
            <span style={{ color: "#c5bbee", fontSize: 13, fontWeight: 700 }}>だい {round} もん / {TOTAL_ROUNDS} もん</span>
            <div style={{ display: "flex", gap: 3 }}>
              {Array.from({ length: TOTAL_ROUNDS }, (_, i) => (
                <div key={i} style={{ width: 7, height: 7, borderRadius: "50%", background: i < round - 1 ? "#ffd700" : i === round - 1 ? "white" : "rgba(255,255,255,0.2)", transition: "background 0.3s" }} />
              ))}
            </div>
          </div>

          {/* メイン */}
          <div style={{ flex: 1, display: "flex", flexDirection: "row", alignItems: "stretch", justifyContent: "center", gap: isLandscape ? 8 : 10, padding: isLandscape ? "8px 6px" : "12px 8px", overflow: "hidden" }}>

            {/* P1エリア（左） */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
              <ScorePanel
                playerNum={1} score={scores[0]} passes={passes}
                isAnswerer={answerer === 0} isActive={questioner === 0 || answerer === 0}
                onPass={handlePass} onUndoPass={handleUndoPass}
                isQuestioner={questioner === 0} phase={phase} onJudge={judge} onUndoJudge={undoJudge} rotated={false}
              />
              {isLandscape && questioner === 0 && phase === "ready" && <ReadyCard questioner={questioner} onReady={handleReady} rotated={false} compact />}
              {isLandscape && phase === "result" && answerer === 0 && <ResultCard roundResult={roundResult} rotated={false} />}
              {isLandscape && phase === "result" && answerer === 0 && <NextButton onClick={nextRound} round={round} total={TOTAL_ROUNDS} rotated={false} />}
            </div>

            {/* 中央エリア */}
            <div style={{ flex: 1, minWidth: isLandscape ? 220 : 260, maxWidth: isLandscape ? 340 : 420, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10 }}>
              <div style={{ display: "flex", gap: 6, width: "100%" }}>
                {[0, 1].map(i => (
                  <div key={i} style={{ flex: 1, padding: "6px 0", borderRadius: 20, textAlign: "center", background: i === questioner ? "#2d1b69" : "#16a085", color: "white", fontSize: 11, fontWeight: 700 }}>
                    P{i + 1}　{i === questioner ? "📖 しゅつだい" : "✏️ かいとう"}
                  </div>
                ))}
              </div>

              {!isLandscape && phase === "ready" && <ReadyCard questioner={questioner} onReady={handleReady} rotated={false} />}

              {(phase === "answer" || phase === "judging" || phase === "result") && (
                <div style={{
                  background: "white", borderRadius: 16, padding: "14px 12px",
                  boxShadow: "0 6px 24px rgba(45,27,105,0.12)",
                  border: `2px solid ${phase === "result" ? (roundResult === 2 ? "#27ae60" : roundResult === 1 ? "#f39c12" : "#e74c3c") : "#16a085"}`,
                  width: "100%", textAlign: "center", transition: "border-color 0.3s",
                }}>
                  <div style={{ fontSize: 12, color: "#888", marginBottom: 8, transform: canvasRotated ? "rotate(180deg)" : "none" }}>
                    P{answerer + 1}（<R k="回答者" r="かいとうしゃ" />）<R k="漢字" r="かんじ" />をかいてください
                  </div>
                  {!isLandscape && phase === "result" && <ResultCard roundResult={roundResult} rotated={canvasRotated} inline />}
                  <DrawingCanvas disabled={phase === "result"} clearSignal={clearSignal} rotated={canvasRotated} />
                  {!isLandscape && phase === "result" && <NextButton onClick={nextRound} round={round} total={TOTAL_ROUNDS} rotated={canvasRotated} style={{ marginTop: 12, width: "100%" }} />}
                </div>
              )}

              {log.length > 0 && (
                <div style={{ width: "100%", background: "rgba(45,27,105,0.05)", borderRadius: 10, padding: "6px 10px" }}>
                  {log.slice(0, 3).map((l, i) => (
                    <div key={i} style={{ fontSize: 10, color: "#777", padding: "2px 0", opacity: Math.max(0.3, 1 - i * 0.28), borderBottom: i < 2 ? "1px solid rgba(0,0,0,0.05)" : "none" }}>{l}</div>
                  ))}
                </div>
              )}
            </div>

            {/* P2エリア（右・常に180度回転） */}
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 8 }}>
              <ScorePanel
                playerNum={2} score={scores[1]} passes={passes}
                isAnswerer={answerer === 1} isActive={questioner === 1 || answerer === 1}
                onPass={handlePass} onUndoPass={handleUndoPass}
                isQuestioner={questioner === 1} phase={phase} onJudge={judge} onUndoJudge={undoJudge} rotated={p2Rotated}
              />
              {isLandscape && questioner === 1 && phase === "ready" && <ReadyCard questioner={questioner} onReady={handleReady} rotated={true} compact />}
              {isLandscape && phase === "result" && answerer === 1 && <ResultCard roundResult={roundResult} rotated={true} />}
              {isLandscape && phase === "result" && answerer === 1 && <NextButton onClick={nextRound} round={round} total={TOTAL_ROUNDS} rotated={true} />}
            </div>

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<KanjiBattle />);
  </script>
</body>
</html>
